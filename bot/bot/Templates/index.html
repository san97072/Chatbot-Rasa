<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente IIS Siciliano | Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Titillium Web', 'Segoe UI', sans-serif;
      background: #b3e0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .chat-layout {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0rem;
      max-width: 1050px;
      width: 100%;
      position: relative;
    }

    .character-container {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 320px;
      position: relative;
      z-index: 1; /* avatar sotto la colonna destra */
      pointer-events: none; /* l'immagine non cattura i click */
    }

    .character-container img {
      width: 500px;
      height: calc(100vh - 3rem);
      max-height: 680px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 8px 18px rgba(0, 50, 100, 0.35));
    }

    .right-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 700px;
      padding-top: 60px;
      position: relative;
      z-index: 2; /* colonna destra sopra l'avatar */
    }

    /* Fumetto conversazione */
    .chat-bubble-container {
      background: white;
      border-radius: 38px 38px 38px 12px;
      padding: 20px 18px 16px;
      box-shadow: 0 20px 30px rgba(0, 80, 130, 0.25);
      border: 3px solid #003f7d;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-bubble-container::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
      border-right: 22px solid #003f7d;
    }

    .chat-bubble-container::after {
      content: "";
      position: absolute;
      left: -16px;
      top: 50%;
      transform: translateY(-50%);
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-right: 18px solid white;
    }

    .chat-conversation {
      flex: 1;
      max-height: 380px;
      overflow-y: auto;
      padding: 8px 6px 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 10px;
    }

    .message-row { display: flex; align-items: flex-end; gap: 6px; }
    .message-row.user { justify-content: flex-end; }

    .msg-bubble {
      max-width: 80%;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .message-row.user .msg-bubble {
      background: #003f7d;
      color: white;
      border-radius: 20px 4px 20px 20px;
    }

    .message-row.assistant .msg-bubble {
      background: #e6f0fc;
      border-radius: 4px 20px 20px 20px;
      border: 1px solid #b8d6f5;
    }

    .msg-time {
      font-size: 0.65rem;
      color: #6b7b8c;
      margin-top: 4px;
      text-align: right;
    }

    .message-row.user .msg-time { color: rgba(255,255,255,0.8); }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
    }

    .quick-btn {
      background: white;
      border: 1.5px solid #003f7d;
      color: #003f7d;
      border-radius: 30px;
      padding: 7px 16px;
      font-size: 1.16rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .quick-btn:hover { background: #003f7d; color: white; }

    .input-area { display: flex; gap: 8px; align-items: center; margin-top: 6px; }

    .chat-input {
      flex: 1;
      border: 2px solid #cbdbe9;
      border-radius: 30px;
      padding: 12px 18px;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }

    .chat-input:focus {
      border-color: #003f7d;
      box-shadow: 0 0 0 3px rgba(0,63,125,0.2);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #003f7d;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,63,125,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover { background: #00a0e0; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      color: #6b7f92;
      margin-top: 8px;
    }

    .chat-conversation::-webkit-scrollbar { width: 5px; }
    .chat-conversation::-webkit-scrollbar-track { background: #e9f0f6; border-radius: 8px; }
    .chat-conversation::-webkit-scrollbar-thumb { background: #003f7d; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="chat-layout">
    <!-- Personaggio -->
    <div class="character-container">
      <img id="avatarImg" src="/static/avatar.png" alt="Avatar">
    </div>

    <!-- Fumetto + bottoni -->
    <div class="right-column">
      <div class="chat-bubble-container">
        <div class="chat-conversation" id="chatMessages"></div>
        <div class="input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Scrivi un messaggio...">
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="footer-note">Creato da Alex Magliocco e Mattia Molinaro</div>
      </div>

      <div class="quick-actions">
        <button class="quick-btn" data-msg="Orari segreteria">📅 Orari segreteria</button>
        <button class="quick-btn" data-msg="Circolari recenti">📋 Circolari recenti</button>
        <button class="quick-btn" data-msg="Percorsi di studio">📚 Percorsi di studio</button>
        <button class="quick-btn" data-msg="Contatti scuola">📞 Contatti</button>
      </div>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    let isWaiting = false;

    function getTime() {
      const now = new Date();
      return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }

    function addMessage(text, isUser) {
      const row = document.createElement('div');
      row.className = 'message-row ' + (isUser ? 'user' : 'assistant');
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = text + '<div class="msg-time">' + getTime() + '</div>';
      row.appendChild(bubble);
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Messaggio iniziale
    addMessage("Ciao! 👋 Sono Enzino, l'assistente virtuale dell'IIS \"Enzo Siciliano\". Come posso aiutarti?", false);

    async function sendMessage(msg) {
      if (!msg.trim() || isWaiting) return;
      isWaiting = true;
      sendBtn.disabled = true;
      addMessage(msg, true);
      chatInput.value = '';

      try {
        const res = await fetch('/webhook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, sender: 'web' })
        });
        if (res.ok) {
          const data = await res.json();
          let html = data.response || 'Non ho capito...';
          if (data.links && data.links.length > 0) {
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">';
            data.links.forEach(link => {
              html += `<a href="${link.url}" target="_blank" rel="noopener"
                style="display:inline-block;background:#003f7d;color:white;border-radius:20px;
                padding:6px 14px;font-size:0.82rem;text-decoration:none;font-weight:600;
                box-shadow:0 2px 6px rgba(0,63,125,0.25);">${link.label}</a>`;
            });
            html += '</div>';
          }
          addMessage(html, false);
        } else {
          addMessage('⚠️ Servizio non disponibile.', false);
        }
      } catch(e) {
        addMessage('⚠️ Errore di connessione.', false);
      }
      isWaiting = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage(chatInput.value);
    });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        sendMessage(this.dataset.msg);
      });
    });
  </script>
</body>
</html>
